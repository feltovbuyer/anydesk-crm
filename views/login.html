<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Login · AnyDesk Web</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
    <div class="login-page">
        <form class="login-card" method="POST" action="/login">
            <div class="login-logo">AnyDesk Web</div>
            <div class="login-sub">Вход в CRM</div>

            {{error}}

            <input name="login" placeholder="Логин" autocomplete="off">
            <input name="password" type="password" placeholder="Пароль">

            <button type="submit">Войти</button>

            <div class="login-hint">admin: feltov / 812</div>
        </form>
    </div>
</body>
</html>
